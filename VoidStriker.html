<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<title>VOID STRIKER — Space Shooter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;overflow:hidden;}
canvas{display:block;border:1px solid #0af;cursor:none;}
#info{color:#0af;font-size:13px;text-align:center;padding:6px 0;letter-spacing:1px;}
</style>
</head>
<body>
<div id="info">WASD / Arrows = kretanje &nbsp;|&nbsp; SPACE = pucanje &nbsp;|&nbsp; ENTER = start</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Responsive size
const W = Math.min(900, window.innerWidth - 10);
const H = Math.min(650, window.innerHeight - 60);
canvas.width = W; canvas.height = H;
canvas.tabIndex = 0;
canvas.focus();

let state = 'title';
let player, bullets, enemies, particles, powerups;
let frame = 0, scrollY = 0;
let spawnRate, powerupTimer;
const keys = {};

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });
canvas.addEventListener('click', () => canvas.focus());

// ── STARS
const stars = Array.from({length: 180}, () => ({
  x: Math.random()*W, y: Math.random()*H,
  s: Math.random()*1.8+0.3,
  c: Math.random()<0.08 ? '#0af' : Math.random()<0.05 ? '#fa0' : '#fff'
}));

function drawStars() {
  for (const st of stars) {
    const y = ((st.y + scrollY * st.s * 0.25) % H + H) % H;
    ctx.globalAlpha = 0.3 + st.s * 0.25;
    ctx.fillStyle = st.c;
    ctx.beginPath();
    ctx.arc(st.x, y, st.s > 1.4 ? 1.5 : 0.8, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── PLAYER
function makePlayer() {
  return {
    x: W/2, y: H-100, w:44, h:52,
    hp: 100, maxHp: 100, speed: 5.5,
    cooldown: 0, shootDelay: 12,
    inv: 0, shake: 0,
    triple: 0, rapid: 0, shield: 0,
    score: 0, level: 1, kills: 0
  };
}

function drawPlayer(p) {
  if (p.inv > 0 && p.inv % 6 < 3) return;
  const x = p.x, y = p.y;
  // Engine flame
  if (frame % 20 < 10) {
    ctx.save();
    ctx.globalAlpha = 0.8;
    ctx.fillStyle = '#f80';
    ctx.beginPath(); ctx.ellipse(x, y+p.h+2, 7, 14, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff0';
    ctx.beginPath(); ctx.ellipse(x, y+p.h+2, 4, 9, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  // Body
  ctx.fillStyle = '#0af';
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x-22, y+p.h);
  ctx.lineTo(x-10, y+p.h-12);
  ctx.lineTo(x,    y+p.h-20);
  ctx.lineTo(x+10, y+p.h-12);
  ctx.lineTo(x+22, y+p.h);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
  // Cockpit
  ctx.fillStyle = '#0cf'; ctx.globalAlpha = 0.85;
  ctx.beginPath(); ctx.ellipse(x, y+10, 5, 9, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  // Wing accent
  ctx.strokeStyle = '#ff0'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x-22,y+p.h); ctx.lineTo(x-10,y+p.h-12); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+22,y+p.h); ctx.lineTo(x+10,y+p.h-12); ctx.stroke();
  // Shield ring
  if (p.shield > 0) {
    ctx.strokeStyle = '#0af'; ctx.lineWidth = 2.5;
    ctx.globalAlpha = 0.55 + Math.sin(frame*0.1)*0.15;
    ctx.beginPath(); ctx.arc(x, y+p.h/2, 36, 0, Math.PI*2); ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

// ── BULLET
class Bullet {
  constructor(x,y,vx,vy,col,friendly) {
    this.x=x; this.y=y; this.vx=vx; this.vy=vy;
    this.col=col; this.friendly=friendly; this.r=friendly?3.5:4.5;
  }
  update() { this.x+=this.vx; this.y+=this.vy; }
  draw() {
    ctx.fillStyle = this.col;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 0.18;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.r*3, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  offScreen() { return this.y<-25||this.y>H+25||this.x<-25||this.x>W+25; }
}

// ── ENEMY
class Enemy {
  constructor(lv) {
    this.x = Math.random()*(W-80)+40;
    this.y = Math.random()*80 - 90;
    const r = Math.random()*100;
    this.type = r<50?'basic':r<75?'fast':r<90?'tank':'zigzag';
    const m = 1 + (lv-1)*0.15;
    if (this.type==='basic')  { this.hp=Math.ceil(2*m); this.spd=2+lv*.1;  this.col='#f44'; this.sz=20; this.val=10; }
    if (this.type==='fast')   { this.hp=1;               this.spd=4+lv*.15; this.col='#f5f'; this.sz=14; this.val=15; }
    if (this.type==='tank')   { this.hp=Math.ceil(8*m);  this.spd=1.2;      this.col='#a4f'; this.sz=30; this.val=30; }
    if (this.type==='zigzag') { this.hp=Math.ceil(3*m);  this.spd=2.5;      this.col='#fa0'; this.sz=18; this.val=20; }
    this.maxHp = this.hp;
    this.shootTimer = Math.random()*80+60;
  }
  update(t) {
    if (this.type==='zigzag') this.x += Math.sin(t*0.08)*3;
    this.y += this.spd;
  }
  draw() {
    const {x,y,sz,col,type,hp,maxHp} = this;
    ctx.fillStyle = col;
    if (type==='basic'||type==='fast') {
      ctx.beginPath();
      ctx.moveTo(x,y-sz); ctx.lineTo(x-sz,y+sz); ctx.lineTo(x+sz,y+sz);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
      if (type==='basic') {
        ctx.fillStyle='#faa';
        ctx.beginPath(); ctx.arc(x,y+2,5,0,Math.PI*2); ctx.fill();
      }
    } else if (type==='tank') {
      ctx.beginPath(); ctx.roundRect(x-sz,y-sz,sz*2,sz*2,6); ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
      ctx.fillStyle='#c8f';
      ctx.beginPath(); ctx.roundRect(x-sz*.5,y-sz*.5,sz,sz,4); ctx.fill();
      // HP bar
      ctx.fillStyle='#333'; ctx.fillRect(x-sz,y-sz-10,sz*2,5);
      ctx.fillStyle='#f44'; ctx.fillRect(x-sz,y-sz-10,sz*2*(hp/maxHp),5);
    } else { // zigzag diamond
      ctx.save(); ctx.translate(x,y); ctx.rotate(Math.PI/4);
      ctx.fillStyle=col; ctx.fillRect(-sz,-sz,sz*2,sz*2);
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.strokeRect(-sz,-sz,sz*2,sz*2);
      ctx.restore();
    }
  }
  tryShoot(px,py) {
    this.shootTimer--;
    if (this.shootTimer<=0) {
      this.shootTimer = Math.random()*70+50;
      const dx=px-this.x, dy=py-this.y, d=Math.hypot(dx,dy)||1;
      return new Bullet(this.x,this.y+this.sz,dx/d*4.5,dy/d*4.5,'#f80',false);
    }
    return null;
  }
  offScreen() { return this.y>H+60; }
  dist(px,py) { return Math.hypot(this.x-px,this.y-py); }
}

// ── POWERUP
class Powerup {
  constructor() {
    this.x = Math.random()*(W-80)+40; this.y = -20;
    const types = ['triple','rapid','shield','health'];
    this.type = types[Math.floor(Math.random()*4)];
    this.cols  = {triple:'#ff0',rapid:'#0f0',shield:'#0af',health:'#f5a'};
    this.labels= {triple:'3×',rapid:'>>',shield:'SH',health:'+HP'};
    this.col   = this.cols[this.type];
    this.label = this.labels[this.type];
    this.t = 0;
  }
  update() { this.y += 2; this.t++; }
  draw() {
    const x=this.x, y=this.y+Math.sin(this.t*0.1)*5;
    ctx.fillStyle=this.col; ctx.globalAlpha=0.88;
    ctx.beginPath(); ctx.arc(x,y,18,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
    ctx.strokeStyle='#fff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(x,y,18,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='#000'; ctx.font='bold 11px monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(this.label,x,y);
  }
  offScreen() { return this.y>H+40; }
  hits(px,py) { return Math.hypot(this.x-px,this.y-py)<30; }
}

// ── PARTICLES
function spawnExplosion(x,y,col,n=15) {
  for (let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, sp=Math.random()*5+1;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:Math.random()*22+10,max:32,col,r:Math.random()*4+1.5});
  }
}
function drawParticles() {
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.06; p.life--;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=p.life/p.max;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ── HUD
function drawHUD(p) {
  ctx.fillStyle='rgba(0,0,10,0.55)';
  ctx.fillRect(0,0,W,52);
  ctx.fillStyle='#0af'; ctx.font=`bold ${Math.round(W/42)}px monospace`;
  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillText('SCORE  '+String(p.score).padStart(7,'0'),12,8);
  ctx.fillStyle='#ff0'; ctx.font=`bold ${Math.round(W/60)}px monospace`;
  ctx.fillText('LEVEL '+p.level,12,34);
  // HP bar
  const bw=Math.min(200,W*0.28), bx=W-bw-12, by=10, bh=18;
  ctx.fillStyle='#1a1a2e'; ctx.fillRect(bx,by,bw,bh);
  const pct=Math.max(0,p.hp/p.maxHp);
  ctx.fillStyle=pct>.5?'#0f8':pct>.25?'#ff0':'#f33';
  ctx.fillRect(bx,by,bw*pct,bh);
  ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,bh);
  ctx.fillStyle='#fff'; ctx.font='11px monospace'; ctx.textBaseline='top';
  ctx.fillText('HP  '+p.hp,bx+6,by+3);
  // Power icons
  const icons=[];
  if(p.triple>0) icons.push({n:'3× SHOT',c:'#ff0',t:p.triple});
  if(p.rapid>0)  icons.push({n:'RAPID',  c:'#0f0',t:p.rapid});
  if(p.shield>0) icons.push({n:'SHIELD', c:'#0af',t:p.shield});
  let ix=10;
  for(const ic of icons){
    ctx.fillStyle=ic.c; ctx.globalAlpha=0.88;
    ctx.beginPath(); ctx.roundRect(ix,H-28,90,20,4); ctx.fill();
    ctx.globalAlpha=1;
    ctx.fillStyle='#000'; ctx.font='bold 10px monospace'; ctx.textBaseline='top';
    ctx.fillText(ic.n+' '+(Math.ceil(ic.t/60))+'s',ix+4,H-26);
    ix+=96;
  }
  ctx.textBaseline='alphabetic';
}

// ── TITLE SCREEN
function drawTitle() {
  ctx.fillStyle='#04040f'; ctx.fillRect(0,0,W,H);
  drawStars();
  const fs=Math.round(W/18);
  ctx.fillStyle='#0af'; ctx.font=`bold ${fs}px monospace`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('VOID STRIKER',W/2,H*0.28);
  ctx.fillStyle='#fff'; ctx.font=`${Math.round(fs*0.5)}px monospace`;
  ctx.fillText('Space Shooter',W/2,H*0.38);
  ctx.fillStyle='#666'; ctx.font=`${Math.round(fs*0.36)}px monospace`;
  ctx.fillText('WASD / Strelice  =  kretanje     SPACE  =  pucanje',W/2,H*0.47);
  if(frame%60<42){
    ctx.fillStyle='#ff0'; ctx.font=`bold ${Math.round(fs*0.44)}px monospace`;
    ctx.fillText('[ PRITISNITE ENTER ZA START ]',W/2,H*0.57);
  }
  // Ship demo
  const cx=W/2, cy=H*0.74;
  ctx.fillStyle='#0af';
  ctx.beginPath();
  ctx.moveTo(cx,cy-26); ctx.lineTo(cx-22,cy+26); ctx.lineTo(cx-10,cy+14);
  ctx.lineTo(cx,cy+6); ctx.lineTo(cx+10,cy+14); ctx.lineTo(cx+22,cy+26);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle='#0cf'; ctx.globalAlpha=0.8;
  ctx.beginPath(); ctx.ellipse(cx,cy-10,5,9,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
}

// ── GAME OVER
function drawGameOver() {
  ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(0,0,W,H);
  const fs=Math.round(W/18);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#f44'; ctx.font=`bold ${fs}px monospace`;
  ctx.fillText('GAME OVER',W/2,H/2-90);
  ctx.fillStyle='#ff0'; ctx.font=`bold ${Math.round(fs*.6)}px monospace`;
  ctx.fillText('Rezultat:  '+String(player.score).padStart(7,'0'),W/2,H/2-30);
  ctx.fillStyle='#0af'; ctx.font=`${Math.round(fs*.5)}px monospace`;
  ctx.fillText('Level:  '+player.level,W/2,H/2+20);
  if(frame%60<42){
    ctx.fillStyle='#aaa'; ctx.font=`${Math.round(fs*.38)}px monospace`;
    ctx.fillText('[ ENTER = ponovo igraj ]',W/2,H/2+80);
  }
}

// ── INIT
function initGame() {
  player   = makePlayer();
  bullets  = []; enemies = []; particles = []; powerups = [];
  frame    = 0; scrollY = 0;
  spawnRate    = 90;
  powerupTimer = 400;
  state = 'play';
}

// ── MAIN LOOP
function loop() {
  requestAnimationFrame(loop);
  frame++; scrollY++;

  // TITLE
  if (state==='title') {
    drawTitle();
    if (keys['Enter']) initGame();
    return;
  }

  // GAME OVER
  if (state==='gameover') {
    ctx.fillStyle='#04040f'; ctx.fillRect(0,0,W,H);
    drawStars();
    drawParticles();
    drawGameOver();
    if (keys['Enter']) initGame();
    return;
  }

  // PLAY — background
  ctx.fillStyle='#04040f'; ctx.fillRect(0,0,W,H);
  drawStars();

  // Level progression
  const killsNeeded = player.level * 10;
  if (player.kills >= killsNeeded) {
    player.level++;
    player.kills = 0;
    spawnRate = Math.max(26, 90 - player.level*5);
  }

  // Player movement
  const sp = player.speed;
  if (keys['ArrowLeft'] ||keys['KeyA']) player.x -= sp;
  if (keys['ArrowRight']||keys['KeyD']) player.x += sp;
  if (keys['ArrowUp']   ||keys['KeyW']) player.y -= sp;
  if (keys['ArrowDown'] ||keys['KeyS']) player.y += sp;
  player.x = Math.max(24, Math.min(W-24, player.x));
  player.y = Math.max(58, Math.min(H-player.h, player.y));

  // Shooting
  if (player.cooldown>0) player.cooldown--;
  if (keys['Space'] && player.cooldown<=0) {
    player.cooldown = player.rapid>0 ? 6 : player.shootDelay;
    const spd = 14;
    if (player.triple>0) {
      for (const ang of [-18,0,18]) {
        const r=(ang-90)*Math.PI/180;
        bullets.push(new Bullet(player.x,player.y-8,Math.cos(r)*spd,Math.sin(r)*spd,'#0af',true));
      }
    } else {
      bullets.push(new Bullet(player.x,player.y-8,0,-spd,'#0af',true));
    }
  }

  // Timers
  if (player.inv>0)    player.inv--;
  if (player.triple>0) player.triple--;
  if (player.rapid>0)  player.rapid--;
  if (player.shield>0) player.shield--;

  // Spawn enemies
  if (frame % spawnRate === 0) {
    enemies.push(new Enemy(player.level));
    if (player.level>=3 && Math.random()<0.35) enemies.push(new Enemy(player.level));
    if (player.level>=6 && Math.random()<0.2)  enemies.push(new Enemy(player.level));
  }

  // Spawn powerups
  powerupTimer--;
  if (powerupTimer<=0) {
    powerups.push(new Powerup());
    powerupTimer = Math.random()*200+280;
  }

  // Enemy update + shoot
  for (const e of enemies) {
    e.update(frame);
    const b = e.tryShoot(player.x, player.y);
    if (b) bullets.push(b);
  }

  // Move bullets
  for (let i=bullets.length-1;i>=0;i--) {
    bullets[i].update();
    if (bullets[i].offScreen()) bullets.splice(i,1);
  }

  // Powerup collision
  for (let i=powerups.length-1;i>=0;i--) {
    const pu=powerups[i]; pu.update();
    if (pu.offScreen()) { powerups.splice(i,1); continue; }
    if (pu.hits(player.x, player.y+player.h/2)) {
      spawnExplosion(pu.x,pu.y,pu.col,12);
      if (pu.type==='triple') player.triple=300;
      else if(pu.type==='rapid') player.rapid=300;
      else if(pu.type==='shield') player.shield=300;
      else player.hp=Math.min(player.maxHp,player.hp+35);
      powerups.splice(i,1);
    }
  }

  // Bullet vs enemy / player collisions
  for (let ei=enemies.length-1;ei>=0;ei--) {
    const e=enemies[ei]; let dead=false;
    // Friendly bullets hit enemy
    for (let bi=bullets.length-1;bi>=0;bi--) {
      const b=bullets[bi];
      if (!b.friendly) continue;
      if (Math.hypot(b.x-e.x,b.y-e.y) < e.sz+5) {
        e.hp--;
        spawnExplosion(b.x,b.y,'#ff0',5);
        bullets.splice(bi,1);
        if (e.hp<=0) {
          spawnExplosion(e.x,e.y,e.col,22);
          player.score += e.val * player.level;
          player.kills++;
          enemies.splice(ei,1);
          dead=true;
        }
        break;
      }
    }
    if (dead) continue;
    // Enemy bullets hit player
    for (let bi=bullets.length-1;bi>=0;bi--) {
      const b=bullets[bi];
      if (b.friendly) continue;
      if (Math.hypot(b.x-player.x,b.y-(player.y+player.h/2)) < 22) {
        bullets.splice(bi,1);
        if (player.inv>0) continue;
        if (player.shield>0) { player.shield=0; spawnExplosion(b.x,b.y,'#0af',8); continue; }
        player.hp -= 15; player.inv = 55;
        spawnExplosion(b.x,b.y,'#f44',8);
      }
    }
    // Enemy body vs player
    if (!dead && e.dist(player.x,player.y+player.h/2) < e.sz+22 && player.inv===0) {
      if (player.shield>0) { player.shield=0; }
      else { player.hp -= 22; player.inv=55; }
      spawnExplosion(e.x,e.y,e.col,16);
      enemies.splice(ei,1);
    } else if (!dead && e.offScreen()) {
      enemies.splice(ei,1);
    }
  }

  // ── DRAW WORLD
  for (const pu of powerups) pu.draw();
  for (const e  of enemies)  e.draw();
  for (const b  of bullets)  b.draw();
  drawParticles();
  drawPlayer(player);
  drawHUD(player);

  if (player.hp<=0) state='gameover';
}

loop();
</script>
</body>
</html>
